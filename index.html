<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTONG</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #222);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 40px 28px;
      border-radius: 24px;
      width: min(90%, 420px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      z-index: 2;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      opacity: 0.85;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    button {
      border: none;
      background: white;
      color: black;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
      animation: shake 0.35s ease;
    }

    .overlay img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
      transform: scale(0.7);
      animation: pop 0.35s ease forwards;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      color: black;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    @keyframes pop {
      to {
        transform: scale(1);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ytong toplantı</h1>
    <p>YTONG toplantı katılım linki.</p>
    <button onclick="showPrank()">Devam Et</button>
  </div>

  <div class="overlay" id="overlay">
    <button class="close-btn" onclick="closePrank()">Kapat</button>
    <img src="foto.jpeg" alt="Sürpriz Fotoğraf">
  </div>

  <script>
    function showPrank() {
      document.getElementById("overlay").classList.add("show");
    }

    function closePrank() {
      document.getElementById("overlay").classList.remove("show");
    }
  </script>
</body>
</html>
